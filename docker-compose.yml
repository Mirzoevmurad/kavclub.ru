version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kavadmin:KavClubSecure2026@db:5432/kavclub_db
    depends_on:
      - db
    restart: always

  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=kavadmin
      - POSTGRES_PASSWORD=KavClubSecure2026
      - POSTGRES_DB=kavclub_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
